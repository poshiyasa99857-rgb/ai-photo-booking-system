version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-photo_booking}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me}
      - DB_NAME=${DB_NAME:-photo_booking}
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_HOST=db
      - DB_PORT=3306
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - CORS_ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 config.wsgi:application"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # 定时任务服务
  scheduler:
    build: ./backend
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me}
      - DB_NAME=${DB_NAME:-photo_booking}
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_HOST=db
      - DB_PORT=3306
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - ./backend/backups:/app/backups
    depends_on:
      - db
      - backend
    command: >
      sh -c "echo '*/5 * * * * cd /app && python manage.py run_scheduled_tasks >> /var/log/cron.log 2>&1' | crontab -
      && cron -f"

volumes:
  mysql_data:
  backend_static:
  backend_media:
